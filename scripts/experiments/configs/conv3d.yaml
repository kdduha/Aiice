output_path: ./outputs

aiice:
  sea: ["Kara Sea", "Barents Sea", "Chukchi Sea", "Sea of Japan", "Laptev Sea"]
  start_date: "1980-01-01"
  end_date: "2020-01-01"
  pre_history_len: 104
  forecast_len: 52
  step: 7
  batch_size: 128
  threads: 4

run:
  model_name: conv3d

  experiments:
    - kernel_size: [3, 3, 3]
      lr: 0.0001
      max_epoch: 375
      patience: 20
      min_delta: 0.001
      initial_patience: 10
      target_loss: 0.3
