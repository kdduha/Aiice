output_path: ./outputs

aiice:
  sea: ["Kara Sea", "Barents Sea", "Chukchi Sea", "Sea of Japan", "Laptev Sea"]
  start_date: "1980-01-01"
  end_date: "2020-01-01"
  pre_history_len: 104
  forecast_len: 52
  step: 7
  batch_size: 16

run:
  model_name: unet

  experiments:
    - base_channels: 16
      depth: 3
      norm_groups: 8
      lr: 0.0001
      weight_decay: 0.000001
      max_epoch: 50
      patience: 10
      min_delta: 0.001
